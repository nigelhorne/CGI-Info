---
# Created by App::GHGen::PerlCustomizer
name: Perl CI

'on':
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        perl:
          - '5.36'
          - '5.38'
          - '5.40'
          - '5.42'
    name: Perl ${{ matrix.perl }} on ${{ matrix.os }}
    env:
      AUTOMATED_TESTING: 1
      NO_NETWORK_TESTING: 1
      NONINTERACTIVE_TESTING: 1
    steps:
      - uses: actions/checkout@v7

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - name: Cache CPAN modules
        uses: actions/cache@v6
        with:
          path: ~/perl5
          key: ${{ runner.os }}-${{ matrix.perl }}-${{ hashFiles('cpanfile') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.perl }}-

      - name: Install cpanm and local::lib
        if: runner.os != 'Windows'
        run: cpanm --notest --local-lib=~/perl5 local::lib

      - name: Install cpanm and local::lib (Windows)
        if: runner.os == 'Windows'
        run: cpanm --notest App::cpanminus local::lib

      - name: Install dependencies
        if: runner.os != 'Windows'
        shell: bash
        run: |
          eval $(perl -I ~/perl5/lib/perl5 -Mlocal::lib)
          cpanm --notest --installdeps .

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          @echo off
          set "PATH=%USERPROFILE%\perl5\bin;%PATH%"
          set "PERL5LIB=%USERPROFILE%\perl5\lib\perl5"
          cpanm --notest --installdeps .

      - name: Lint and syntax check
        shell: perl {0}
        run: |
          use strict;
          use warnings;
          use File::Find;
          use lib 'lib';
          my @failed;
          push @INC, sub { open my $h, '<', \qq{1;\n}; $h };
          my @dirs = grep { -d } qw(lib bin);
          @dirs = ('.') unless @dirs;
          find({ wanted => sub {
              return unless -f && /\.pm$/;
              my $file = $File::Find::name;
              do $file;
              if ($@) {
                  warn "Syntax check failed: $file\n";
                  push @failed, $file;
              }
          }, no_chdir => 1 }, @dirs);

          if (($ENV{RUNNER_OS} // '') eq 'Linux') {
              system('cpanm --notest --quiet warnings::unused 2>/dev/null');
              system('PERL5OPT=-Mwarnings::unused prove -lr t/ 2>&1 | grep -i unused && true || echo "warnings::unused: no unused variables detected"');
          }

          exit(@failed ? 1 : 0);

      - name: Run tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          eval $(perl -I ~/perl5/lib/perl5 -Mlocal::lib)
          prove -lr t/

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          @echo off
          set "PATH=%USERPROFILE%\perl5\bin;%PATH%"
          set "PERL5LIB=%USERPROFILE%\perl5\lib\perl5"
          prove -lr t/

      - name: Run Perl::Critic
        if: matrix.perl == '5.42' && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          eval $(perl -I ~/perl5/lib/perl5 -Mlocal::lib)
          cpanm --notest Perl::Critic
          perlcritic --severity 3 lib/ || true
        shell: bash

      - name: Check imports with perlimports
        if: matrix.perl == '5.42' && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          eval $(perl -I ~/perl5/lib/perl5 -Mlocal::lib)
          cpanm --notest App::perlimports
          find lib -name '*.pm' | xargs perlimports --lint
        shell: bash

      - name: Test coverage
        if: matrix.perl == '5.42' && matrix.os == 'ubuntu-latest'
        run: |
          eval $(perl -I ~/perl5/lib/perl5 -Mlocal::lib)
          cpanm --notest Devel::Cover
          cover -delete
          HARNESS_PERL_SWITCHES=-MDevel::Cover prove -lr t/
          cover
        shell: bash

      - name: Show cpanm build log on failure (Windows)
        if: runner.os == 'Windows' && failure()
        shell: pwsh
        run: Get-Content "$env:USERPROFILE\.cpanm\work\*\build.log" -Tail 100

      - name: Show cpanm build log on failure (non-Windows)
        if: runner.os != 'Windows' && failure()
        run: tail -100 "$HOME/.cpanm/work/*/build.log"
